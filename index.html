<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trust Payments Checkout Test</title>
  <link rel="icon" href="data:," />
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; max-width: 1100px; margin: 0 auto; }
    .row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 6px; min-width: 180px; }
    .field.wide { min-width: 280px; }
    .section { margin-top: 20px; padding-top: 14px; border-top: 1px solid #e5e7eb; }
    input, button, select { padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; }
    button { cursor: pointer; }
    textarea { padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-family: inherit; }
    #st-google-pay, #st-apple-pay { width: 100%; max-width: 420px; height: 60px; margin: 12px 0; border: 1px dashed #ccc; }
    #st-card-number, #st-expiration-date, #st-security-code {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 12px;
      min-height: 24px;
      max-width: 420px;
    }
    #pay-card-btn[disabled] { opacity: 0.5; cursor: not-allowed; }
    #payment-result { display: none; white-space: pre-wrap; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 6px; padding: 10px; max-width: 900px; }
    .align-end { align-self: end; }
    .full-width { width: 100%; }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 16px;
    }
    .modal-backdrop.active { display: flex; }
    .modal-panel {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .modal-title { margin: 0; font-size: 18px; }
    .modal-close { background: #fff; }
    .modal-panel form { display: flex; flex-direction: column; gap: 10px; }
    .st-inline { display: flex; gap: 10px; max-width: 420px; }
    .st-inline > div { flex: 1; max-width: none; }
    .error { color: #dc2626; }
    .success { color: #16a34a; }

  </style>
</head>
<body>
  <h1>Checkout Test</h1>
  <p>Google Pay is preserved. Card payment is added using st.Components.</p>
  <p>For local testing with Trust CDN, open this app via IPv4 (not localhost/127.0.0.1).</p>

  <div class="row">
    <div class="field">
      <label for="amount">Amount</label>
      <input id="amount" type="text" value="10.00" />
    </div>
    <div class="field">
      <label for="currency">Currency</label>
      <input id="currency" type="text" value="USD" />
    </div>
    <div class="field wide">
      <label for="auth-token">Auth Token</label>
      <input id="auth-token" type="text" />
    </div>
    <div class="field">
      <label for="owner-type">Owner Type</label>
      <select id="owner-type">
        <option value="customer" selected>Customer</option>
        <option value="store">Store</option>
      </select>
    </div>
  </div>

  <div class="row">
    <button id="init-google-btn" type="button">Init Google Pay</button>
    <button id="init-apple-btn" type="button">Init Apple Pay</button>
    <button id="init-card-btn" type="button">Init Card</button>
    <button id="init-card-tokenize-btn" type="button">Init Save Card (No Payment)</button>
  </div>

  <p id="status">Idle</p>
  <div id="st-notification-frame"></div>
  <pre id="payment-result"></pre>

  <div class="section">
    <h3>Google Pay</h3>
    <div id="st-google-pay"></div>
  </div>

  <div class="section">
    <h3>Apple Pay</h3>
    <div id="st-apple-pay"></div>
    <div id="applepay-diagnostics" style="background:#f1f5f9;border:1px solid #cbd5e1;border-radius:6px;padding:10px;margin:10px 0;max-width:900px;font-size:14px;color:#334155"></div>
  </div>

  <div id="card-modal" class="modal-backdrop" aria-hidden="true">
    <div class="modal-panel">
      <div class="modal-header">
        <h3 id="card-modal-title" class="modal-title">Card</h3>
        <button id="card-modal-close" class="modal-close" type="button">Close</button>
      </div>
      <form id="st-form" method="POST">
        <input type="hidden" name="paymentSessionId" id="payment-session-id" />
        <input type="hidden" name="requestReference" id="request-reference" />
        <div id="st-card-number"></div>
        <div class="st-inline">
          <div id="st-expiration-date"></div>
          <div id="st-security-code"></div>
        </div>
        <button id="pay-card-btn" type="submit" disabled>Pay securely</button>
      </form>
    </div>
  </div>

  <script src="./config.js"></script>
  <script src="https://cdn.eu.trustpayments.com/js/latest/st.js"></script>
  <script>
    (function() {
      const TEST_AUTH_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyX2lkIjoxLCJlbWFpbCI6ImpvaG4uZG9lQGV4YW1wbGUuY29tIiwicm9sZSI6InVzZXIiLCJpYXQiOjE3NzMzNTMyODQsImV4cCI6MTc3MzQzOTY4NH0.qQXbyp9jfJkNvkCLxO2vFDdCSQQMjAy3s8hB4CcZrZ0";

      const statusEl = document.getElementById('status');
      const notificationFrame = document.getElementById('st-notification-frame');
      const resultEl = document.getElementById('payment-result');
      const amountEl = document.getElementById('amount');
      const currencyEl = document.getElementById('currency');
      const authTokenEl = document.getElementById('auth-token');
      const ownerTypeEl = document.getElementById('owner-type');
      const initGoogleBtn = document.getElementById('init-google-btn');
      const initAppleBtn = document.getElementById('init-apple-btn');
      const initCardBtn = document.getElementById('init-card-btn');
      const initCardTokenizeBtn = document.getElementById('init-card-tokenize-btn');
      const payCardBtn = document.getElementById('pay-card-btn');
      const formEl = document.getElementById('st-form');
      const cardModalEl = document.getElementById('card-modal');
      const cardModalTitleEl = document.getElementById('card-modal-title');
      const cardModalCloseEl = document.getElementById('card-modal-close');
      const paymentSessionIdEl = document.getElementById('payment-session-id');
      const requestReferenceEl = document.getElementById('request-reference');

      const API_BASE_URL = (window.PAYMENT_API_BASE_URL || '').replace(/\/$/, '');
      const api = (path) => `${API_BASE_URL}${path}`;
      let paymentSessionId = localStorage.getItem('paymentSessionId') || '';
      let cardFlowMode = 'PAYMENT';

      authTokenEl.value = window.PAYMENT_AUTH_TOKEN || TEST_AUTH_TOKEN;
      ownerTypeEl.value = window.PAYMENT_OWNER_TYPE || ownerTypeEl.value || 'customer';

      function formatErrorMessage(error) {
        if (!error) return 'Unknown error';
        if (typeof error === 'string') return error;
        if (error.message) return error.message;
        if (error.errorcode || error.errormessage) {
          let text = error.errormessage || 'Payment request failed';
          if (error.errorcode) text += ` (code: ${error.errorcode})`;
          if (error.errordata?.length) text += ` - field: ${error.errordata.filter(Boolean).join(', ')}`;
          return text;
        }
        try {
          return JSON.stringify(error);
        } catch {
          return 'Unknown error';
        }
      }

      function setStatus(message, type) {
        statusEl.textContent = message;
        statusEl.className = type || '';
      }

      function showOutcome(success, message, details = {}) {
        setStatus(message, success ? 'success' : 'error');
        if (Object.keys(details).length > 0) {
          resultEl.style.display = 'block';
          resultEl.textContent = JSON.stringify(details, null, 2);
        }
      }

      function openCardModal(titleText) {
        if (cardModalTitleEl && titleText) {
          cardModalTitleEl.textContent = titleText;
        }
        if (cardModalEl) {
          cardModalEl.classList.add('active');
          cardModalEl.setAttribute('aria-hidden', 'false');
        }
      }

      function closeCardModal() {
        if (cardModalEl) {
          cardModalEl.classList.remove('active');
          cardModalEl.setAttribute('aria-hidden', 'true');
        }
      }

      function getOwnerType() {
        const requested = String(ownerTypeEl?.value || '').trim().toLowerCase();
        if (requested === 'store') return 'store';
        if (requested === 'customer' || requested === 'cust') return 'customer';
        return 'customer';
      }

      function getAuthHeaders() {
        const authToken = (authTokenEl.value || '').trim();
        if (!authToken) {
          throw new Error('Auth token is required');
        }
        return {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${authToken}`
        };
      }

      async function verifyWithBackend(responseJwt) {
        const verifyRes = await fetch(api('/api/v1/payments/response/verify'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            jwt: responseJwt,
            paymentSessionId,
            requestReference: paymentSessionId
          })
        });
        const payload = await verifyRes.json();
        if (!verifyRes.ok || !payload.verified) {
          throw new Error(payload.error || payload.message || 'Verification failed');
        }
        return payload;
      }

      async function createInitSession(paymentMethod) {
        const amount = (amountEl.value || '').trim();
        const currency = (currencyEl.value || '').trim().toUpperCase();
        const authToken = (authTokenEl.value || '').trim();

        const initRes = await fetch(api('/api/v1/payments/jwt/init'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount, currency, authToken, paymentMethod })
        });

        const initPayload = await initRes.json();
        if (!initRes.ok || !initPayload.jwt || !initPayload.paymentSessionId) {
          throw new Error(initPayload.error || `Init ${paymentMethod} failed`);
        }

        paymentSessionId = initPayload.paymentSessionId;
        localStorage.setItem('paymentSessionId', paymentSessionId);
        paymentSessionIdEl.value = paymentSessionId;
        requestReferenceEl.value = paymentSessionId;

        return initPayload;
      }

      async function handleGatewayQueryCallback() {
        const query = new URLSearchParams(window.location.search);
        const responseJwt = query.get('jwt');
        const errorcode = query.get('errorcode');
        const transactionreference = query.get('transactionreference');

        if (!responseJwt && !errorcode && !transactionreference) return;

        try {
          if (!responseJwt) {
            throw new Error(errorcode || 'No JWT returned from gateway');
          }
          setStatus('Verifying callback with backend...');
          const verified = await verifyWithBackend(responseJwt);
          showOutcome(true, 'Wallet payment successful', { verified });
          localStorage.removeItem('paymentSessionId');
        } catch (error) {
          showOutcome(false, 'Wallet payment failed: ' + formatErrorMessage(error), {
            errorcode,
            transactionreference,
            error: formatErrorMessage(error)
          });
        }

        window.history.replaceState({}, document.title, window.location.pathname);
      }

      async function initGooglePay() {
        try {
          setStatus('Initializing Google Pay...');
          const initPayload = await createInitSession('GOOGLEPAY');
          const st = SecureTrading({ jwt: initPayload.jwt, errorReporting: true });

          const gpayInit = st.GooglePay({
            buttonOptions: {
              buttonRootNode: 'st-google-pay',
              buttonType: 'pay',
              buttonColor: 'black',
              buttonLocale: 'en'
            },
            paymentRequest: {
              environment: 'TEST',
              merchantInfo: {
                merchantId: 'BCR2DN5TZC6I563Y',
                merchantName: 'RRoM International'
              },
              allowedPaymentMethods: [{
                parameters: {
                  allowedAuthMethods: ['PAN_ONLY', 'CRYPTOGRAM_3DS'],
                  allowedCardNetworks: ['VISA', 'MASTERCARD', 'AMEX']
                }
              }],
              transactionInfo: {
                countryCode: 'US',
                currencyCode: (currencyEl.value || 'USD').trim().toUpperCase(),
                totalPriceStatus: 'FINAL',
                totalPrice: (amountEl.value || '10.00').trim()
              }
            }
          });

          if (gpayInit && typeof gpayInit.then === 'function') {
            gpayInit.catch((err) => {
              showOutcome(false, 'Google Pay init error: ' + formatErrorMessage(err), { source: 'GooglePay.init' });
            });
          }

          showOutcome(true, 'Google Pay initialized', { init: initPayload });
        } catch (error) {
          showOutcome(false, 'Google Pay initialization failed: ' + formatErrorMessage(error), {
            source: 'google-init'
          });
        }
      }

      async function initApplePay() {
        try {
          const appleSiteReference = window.APPLE_PAY_SITE_REFERENCE || window.APPLE_PAY_MERCHANT_ID || '';
          // Apple Pay diagnostics panel
          const applePayDiagnostics = document.getElementById('applepay-diagnostics');
          function printApplePayDiagnostics() {
            const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            const applePaySupported = typeof window.ApplePaySession !== 'undefined';
            let eligibility = 'Unknown';
            if (!applePaySupported) eligibility = 'ApplePaySession not available';
            else eligibility = 'Eligible';
            const diag = [
              `User Agent: ${navigator.userAgent}`,
              `Safari: ${isSafari}`,
              `iOS: ${isIOS}`,
              `ApplePaySession supported: ${applePaySupported}`,
              `Eligibility: ${eligibility}`
            ];
            applePayDiagnostics.innerHTML = '<b>Apple Pay Diagnostics</b><br>' + diag.map(x => x).join('<br>');
            console.log('Apple Pay Diagnostics:', diag);
          }
          printApplePayDiagnostics();

          const hasApplePaySession = typeof window.ApplePaySession !== 'undefined';
          const canMakePayments =
            hasApplePaySession &&
            typeof window.ApplePaySession.canMakePayments === 'function' &&
            window.ApplePaySession.canMakePayments();
          console.log('ApplePaySession:', hasApplePaySession, 'canMakePayments:', canMakePayments);

          if (!window.isSecureContext) {
            console.error('Apple Pay requires HTTPS (secure context).');
            throw new Error('Apple Pay requires HTTPS (secure context).');
          }

          if (!hasApplePaySession || !canMakePayments) {
            setStatus('Apple Pay may not be payable in this browser/device; attempting initialization for button visibility.', 'error');
            console.warn('Apple Pay not payable:', { hasApplePaySession, canMakePayments });
          }

          if (!appleSiteReference) {
            throw new Error('Apple Pay site reference missing. Set window.APPLE_PAY_SITE_REFERENCE in config.js');
          }

          setStatus('Initializing Apple Pay...');
          const initPayload = await createInitSession('APPLEPAY');
          console.log('Apple Pay JWT:', initPayload.jwt);
          const st = SecureTrading({ jwt: initPayload.jwt, errorReporting: true });

          if (typeof st.ApplePay !== 'function') {
            console.error('st.js ApplePay() is not available in this version/config');
            throw new Error('st.js ApplePay() is not available in this version/config');
          }

          const appleInit = st.ApplePay({
            buttonStyle: 'black',
            buttonText: 'plain',
            // Trust Payments: use site reference (not Apple merchantId) after May 2024 changes
            merchantId: appleSiteReference,
            paymentRequest: {
              countryCode: (currencyEl.value || 'USD').trim().toUpperCase(),
              currencyCode: (currencyEl.value || 'USD').trim().toUpperCase(),
              merchantCapabilities: ['supports3DS', 'supportsCredit', 'supportsDebit'],
              supportedNetworks: ['visa', 'masterCard', 'amex'],
              requiredBillingContactFields: ['postalAddress'],
              requiredShippingContactFields: ['postalAddress', 'name', 'phone', 'email'],
              total: {
                label: 'DropN-Dash',
                amount: (amountEl.value || '10.00').trim()
              }
            },
            buttonPlacement: 'st-apple-pay'
            // Optional alternate flow:
            // merchantUrl: api('/api/v1/payments/applepay/process')
          });
          if (!appleInit) {
            console.error('st.ApplePay() did not return an object');
          }

          if (appleInit && typeof appleInit.then === 'function') {
            appleInit.catch((err) => {
              showOutcome(false, 'Apple Pay init error: ' + formatErrorMessage(err), { source: 'ApplePay.init' });
              console.error('Apple Pay init promise rejected:', err);
            });
          }

          setTimeout(() => {
            const container = document.getElementById('st-apple-pay');
            console.log('Apple Pay container HTML:', container.innerHTML);
            if (!container.innerHTML.trim()) {
              setStatus('⚠️ Apple Pay button not rendered. Possible reasons:<br>• Merchant/domain not verified<br>• Trust Payments config issue<br>• Check console for errors', 'error');
            }
          }, 2000);

          showOutcome(true, 'Apple Pay initialized', { init: initPayload });
        } catch (error) {
          showOutcome(false, 'Apple Pay initialization failed: ' + formatErrorMessage(error), {
            source: 'apple-init'
          });
          console.error('Apple Pay initialization failed:', error);
        }
      }

      async function initCard() {
        try {
          setStatus('Initializing card form...');
          cardFlowMode = 'PAYMENT';
          payCardBtn.textContent = 'Pay securely';
          const initPayload = await createInitSession('CARD');

          formEl.action = api(initPayload.processPath || '/api/v1/payments/card/process');
          openCardModal('Pay by Card');

          const st = SecureTrading({
            jwt: initPayload.jwt,
            errorReporting: true,
            submitOnSuccess: false,
            submitOnError: false,
            submitOnCancel: false,
            submitCallback: async (data) => {
              const responseJwt = data && (data.jwt || data.responsejwt || data.responseJwt);
              if (!responseJwt) {
                showOutcome(false, 'Card payment failed: JWT missing in callback', { callback: data || null });
                return;
              }
              try {
                const verified = await verifyWithBackend(responseJwt);
                showOutcome(true, 'Card payment successful', { verified, callback: data });
                localStorage.removeItem('paymentSessionId');
                closeCardModal();
              } catch (verifyErr) {
                showOutcome(false, 'Card payment verify failed: ' + formatErrorMessage(verifyErr), {
                  callback: data,
                  error: formatErrorMessage(verifyErr)
                });
              }
            },
            components: {
              callbacks: {
                onPaymentFormRendered() {
                  setStatus('Card form ready', 'success');
                },
                onPaymentFormValidityChange(data) {
                  payCardBtn.disabled = !(data && data.isFormValid);
                }
              }
            }
          });

          st.Components();
          showOutcome(true, 'Card initialized', { init: initPayload });
        } catch (error) {
          showOutcome(false, 'Card initialization failed: ' + formatErrorMessage(error), {
            source: 'card-init'
          });
        }
      }

      async function initCardTokenize() {
        try {
          setStatus('Initializing save-card form...');
          cardFlowMode = 'TOKENIZE_ONLY';
          payCardBtn.textContent = 'Save card token';

          const ownerType = getOwnerType();
          const amount = '0';
          const currency = (currencyEl.value || 'USD').trim().toUpperCase();

          const res = await fetch(api('/api/v1/payments/cards/tokenize/init'), {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
              type: ownerType,
              amount,
              currency
            })
          });

          const initPayload = await res.json();
          if (!res.ok || !initPayload.success || !initPayload.jwt || !initPayload.paymentSessionId) {
            throw new Error(initPayload.message || initPayload.error || 'Tokenize init failed');
          }

          paymentSessionId = initPayload.paymentSessionId;
          localStorage.setItem('paymentSessionId', paymentSessionId);
          paymentSessionIdEl.value = paymentSessionId;
          requestReferenceEl.value = paymentSessionId;

          formEl.action = api(initPayload.processPath || '/api/v1/payments/cards/tokenize/complete');
          openCardModal('Save Card');

          const st = SecureTrading({
            jwt: initPayload.jwt,
            errorReporting: true,
            submitOnSuccess: false,
            submitOnError: false,
            submitOnCancel: false,
            submitCallback: async (data) => {
              const responseJwt = data && (data.jwt || data.responsejwt || data.responseJwt);
              if (!responseJwt) {
                showOutcome(false, 'Tokenization failed: JWT missing in callback', { callback: data || null });
                return;
              }

              try {
                const completeRes = await fetch(api('/api/v1/payments/cards/tokenize/complete'), {
                  method: 'POST',
                  headers: getAuthHeaders(),
                  body: JSON.stringify({
                    type: ownerType,
                    jwt: responseJwt,
                    paymentSessionId,
                    isDefault: false
                  })
                });
                const completeData = await completeRes.json();
                if (!completeRes.ok || !completeData.success) {
                  throw new Error(completeData.message || completeData.error || 'Tokenize complete failed');
                }

                showOutcome(true, 'Card tokenized and saved successfully', completeData);
                closeCardModal();
              } catch (completeErr) {
                showOutcome(false, 'Tokenize complete failed: ' + formatErrorMessage(completeErr), {
                  callback: data,
                  error: formatErrorMessage(completeErr)
                });
              }
            },
            components: {
              callbacks: {
                onPaymentFormRendered() {
                  setStatus('Save-card form ready', 'success');
                },
                onPaymentFormValidityChange(data) {
                  payCardBtn.disabled = !(data && data.isFormValid);
                }
              }
            }
          });

          st.Components();
          showOutcome(true, 'Save-card tokenization initialized', { init: initPayload });
        } catch (error) {
          showOutcome(false, 'Tokenization init failed: ' + formatErrorMessage(error), {
            source: 'tokenize-init'
          });
        }
      }

      window.addEventListener('error', (event) => {
        showOutcome(false, 'Error: ' + formatErrorMessage(event.error || event.message), { source: 'window.error' });
      });

      window.addEventListener('unhandledrejection', (event) => {
        showOutcome(false, 'Error: ' + formatErrorMessage(event.reason), { source: 'unhandledrejection' });
      });

      if (notificationFrame) {
        new MutationObserver(() => {
          const text = notificationFrame.textContent && notificationFrame.textContent.trim();
          if (text) {
            setStatus('ST Notification: ' + text);
          }
        }).observe(notificationFrame, { childList: true, subtree: true, characterData: true });
      }

      if (!API_BASE_URL) {
        setStatus('Set window.PAYMENT_API_BASE_URL in config.js', 'error');
        return;
      }

      handleGatewayQueryCallback();
      if (cardModalCloseEl) {
        cardModalCloseEl.addEventListener('click', closeCardModal);
      }
      if (cardModalEl) {
        cardModalEl.addEventListener('click', (event) => {
          if (event.target === cardModalEl) {
            closeCardModal();
          }
        });
      }
      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          closeCardModal();
        }
      });
      initGoogleBtn.addEventListener('click', initGooglePay);
      initAppleBtn.addEventListener('click', initApplePay);
      initCardBtn.addEventListener('click', initCard);
      initCardTokenizeBtn.addEventListener('click', initCardTokenize);
    })();
  </script>
</body>
</html>
