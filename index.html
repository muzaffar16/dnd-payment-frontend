<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trust Payments Checkout Test</title>
  <link rel="icon" href="data:," />
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; }
    .row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 6px; min-width: 180px; }
    .field.wide { min-width: 240px; }
    .section { margin-top: 20px; padding-top: 12px; border-top: 1px solid #e5e7eb; }
    input, button { padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; }
    button { cursor: pointer; }
    #pay-btn[disabled] { opacity: 0.5; cursor: not-allowed; }
    #st-google-pay, #st-apple-pay { width: 100%; max-width: 420px; min-height: 56px; }
    #st-card-number, #st-expiration-date, #st-security-code {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 10px;
      min-height: 24px;
    }
    #payment-result {
      display: none;
      white-space: pre-wrap;
      background: #f8fafc;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 10px;
      margin-top: 14px;
    }
    .error { color: #dc2626; }
    .success { color: #16a34a; }
  </style>
</head>
<body>
  <h1>Checkout Test (Google Pay / Apple Pay / Card)</h1>
  <p>For local testing with Trust CDN, open this app using your machine IPv4 address (not localhost/127.0.0.1).</p>

  <div class="row">
    <div class="field">
      <label for="amount">Amount</label>
      <input id="amount" type="text" value="10.00" />
    </div>
    <div class="field">
      <label for="currency">Currency</label>
      <input id="currency" type="text" value="USD" />
    </div>
    <div class="field wide">
      <label for="auth-token">Auth Token</label>
      <input id="auth-token" type="text" />
    </div>
  </div>

  <div class="row">
    <button id="init-google-btn" type="button">Init Google Pay</button>
    <button id="init-apple-btn" type="button">Init Apple Pay</button>
    <button id="init-card-btn" type="button">Init Card</button>
  </div>

  <p id="status">Idle</p>
  <div id="st-notification-frame"></div>

  <div class="section">
    <h3>Wallets</h3>
    <div id="st-google-pay"></div>
    <div id="st-apple-pay"></div>
  </div>

  <form id="st-form" method="POST" class="section">
    <h3>Card</h3>
    <input type="hidden" name="paymentSessionId" id="payment-session-id" />
    <input type="hidden" name="requestReference" id="request-reference" />
    <div id="st-card-number"></div>
    <div id="st-expiration-date"></div>
    <div id="st-security-code"></div>
    <button id="pay-btn" type="submit" disabled>Pay securely</button>
  </form>

  <pre id="payment-result"></pre>

  <script src="./config.js"></script>
  <script src="https://cdn.eu.trustpayments.com/js/latest/st.js"></script>
  <script>
    (function () {
      const DEFAULT_AUTH_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyX2lkIjoiNTg3MzdiZDgtZmIxNC00ODVlLWFlNWUtMjVlYzBhMWY1OWFjIiwiZW1haWwiOiJtdXNodGFxYWxpbWFsaWsxMUBnbWFpbC5jb20iLCJpYXQiOjE3NzI5MTk2MTksImV4cCI6MTc3MzAwNjAxOX0.ZLpjnHC7iG-U7_O2Pt2GR9vIJ6B78hYF8gwkUoJ-tAE";
      const API_BASE_URL = (window.PAYMENT_API_BASE_URL || '').replace(/\/$/, '');
      const api = (path) => `${API_BASE_URL}${path}`;

      const amountInput = document.getElementById('amount');
      const currencyInput = document.getElementById('currency');
      const authTokenInput = document.getElementById('auth-token');
      const initGoogleBtn = document.getElementById('init-google-btn');
      const initAppleBtn = document.getElementById('init-apple-btn');
      const initCardBtn = document.getElementById('init-card-btn');
      const payBtn = document.getElementById('pay-btn');
      const statusEl = document.getElementById('status');
      const resultEl = document.getElementById('payment-result');
      const formEl = document.getElementById('st-form');
      const sessionIdInput = document.getElementById('payment-session-id');
      const requestRefInput = document.getElementById('request-reference');

      let paymentSessionId = localStorage.getItem('paymentSessionId') || '';
      authTokenInput.value = window.PAYMENT_AUTH_TOKEN || DEFAULT_AUTH_TOKEN;

      function setStatus(text, type) {
        statusEl.textContent = text;
        statusEl.className = type || '';
      }

      function showResult(data) {
        resultEl.style.display = 'block';
        resultEl.textContent = JSON.stringify(data, null, 2);
      }

      function normalizeError(error) {
        if (!error) return 'Unknown error';
        if (typeof error === 'string') return error;
        if (error.message) return error.message;
        try {
          return JSON.stringify(error);
        } catch {
          return 'Unknown error';
        }
      }

      async function handleGatewayResponseFromQuery() {
        const query = new URLSearchParams(window.location.search);
        const responseJwt = query.get('jwt');
        const errorcode = query.get('errorcode');
        const transactionreference = query.get('transactionreference');

        if (!responseJwt && !errorcode && !transactionreference) {
          return;
        }

        try {
          if (!responseJwt) {
            throw new Error(errorcode || 'No JWT in callback');
          }

          setStatus('Verifying wallet callback with backend...', '');
          const verifyPayload = await verifyWithBackend(responseJwt);
          setStatus('Wallet payment successful', 'success');
          showResult({ verified: verifyPayload, source: 'query-callback' });
          localStorage.removeItem('paymentSessionId');
        } catch (error) {
          setStatus(`Wallet payment failed: ${normalizeError(error)}`, 'error');
          showResult({ source: 'query-callback', error: normalizeError(error) });
        } finally {
          window.history.replaceState({}, document.title, window.location.pathname);
        }
      }

      async function createInitSession(paymentMethod) {
        if (!API_BASE_URL) {
          throw new Error('Set window.PAYMENT_API_BASE_URL in config.js');
        }

        const authToken = (authTokenInput.value || '').trim();
        if (!authToken) {
          throw new Error('Auth token is required');
        }

        const amount = (amountInput.value || '').trim();
        const currency = (currencyInput.value || '').trim().toUpperCase();

        const initRes = await fetch(api('/api/v1/payments/jwt/init'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            amount,
            currency,
            authToken,
            paymentMethod
          })
        });

        const initPayload = await initRes.json();
        if (!initRes.ok || !initPayload.jwt || !initPayload.paymentSessionId) {
          throw new Error(initPayload.error || `Failed to initialize ${paymentMethod}`);
        }

        paymentSessionId = initPayload.paymentSessionId;
        localStorage.setItem('paymentSessionId', paymentSessionId);

        sessionIdInput.value = paymentSessionId;
        requestRefInput.value = paymentSessionId;
        formEl.action = api(initPayload.processPath || '/api/v1/payments/card/process');

        return initPayload;
      }

      async function initializeGooglePaySession() {
        try {
          setStatus('Requesting GOOGLEPAY JWT...', '');
          const initPayload = await createInitSession('GOOGLEPAY');
          const st = SecureTrading({ jwt: initPayload.jwt, errorReporting: true });

          const gpayInit = st.GooglePay({
            buttonOptions: {
              buttonRootNode: 'st-google-pay',
              buttonType: 'pay',
              buttonColor: 'black',
              buttonLocale: 'en'
            },
            paymentRequest: {
              environment: 'TEST',
              merchantInfo: {
                merchantId: 'BCR2DN5TZC6I563Y',
                merchantName: 'RRoM International'
              },
              allowedPaymentMethods: [{
                parameters: {
                  allowedAuthMethods: ['PAN_ONLY', 'CRYPTOGRAM_3DS'],
                  allowedCardNetworks: ['VISA', 'MASTERCARD', 'AMEX']
                }
              }],
              transactionInfo: {
                countryCode: 'US',
                currencyCode: (currencyInput.value || 'USD').trim().toUpperCase(),
                totalPriceStatus: 'FINAL',
                totalPrice: (amountInput.value || '10.00').trim()
              }
            }
          });

          if (gpayInit && typeof gpayInit.then === 'function') {
            gpayInit.catch((err) => {
              setStatus(`Google Pay init failed: ${normalizeError(err)}`, 'error');
            });
          }

          setStatus('Google Pay initialized', 'success');
          showResult({ init: initPayload, method: 'GOOGLEPAY' });
        } catch (error) {
          setStatus(`Google Pay init failed: ${normalizeError(error)}`, 'error');
          showResult({ error: normalizeError(error), method: 'GOOGLEPAY' });
        }
      }

      async function initializeApplePaySession() {
        try {
          setStatus('Requesting APPLEPAY JWT...', '');
          const initPayload = await createInitSession('APPLEPAY');
          const st = SecureTrading({ jwt: initPayload.jwt, errorReporting: true });

          if (typeof st.ApplePay !== 'function') {
            throw new Error('st.ApplePay is not available in this browser/environment');
          }

          const appleInit = st.ApplePay({
            buttonOptions: {
              buttonRootNode: 'st-apple-pay'
            }
          });

          if (appleInit && typeof appleInit.then === 'function') {
            appleInit.catch((err) => {
              setStatus(`Apple Pay init failed: ${normalizeError(err)}`, 'error');
            });
          }

          setStatus('Apple Pay initialized', 'success');
          showResult({ init: initPayload, method: 'APPLEPAY' });
        } catch (error) {
          setStatus(`Apple Pay init failed: ${normalizeError(error)}`, 'error');
          showResult({ error: normalizeError(error), method: 'APPLEPAY' });
        }
      }

      async function verifyWithBackend(responseJwt) {
        const verifyRes = await fetch(api('/api/v1/payments/response/verify'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            jwt: responseJwt,
            paymentSessionId,
            requestReference: paymentSessionId
          })
        });

        const payload = await verifyRes.json();
        if (!verifyRes.ok || !payload.verified) {
          throw new Error(payload.error || payload.message || 'Verification failed');
        }

        return payload;
      }

      async function onSubmitCallback(data) {
        const responseJwt = data && (data.jwt || data.responsejwt || data.responseJwt);
        if (!responseJwt) {
          setStatus('Payment did not return a JWT response', 'error');
          showResult({ callback: data || null });
          return;
        }

        try {
          setStatus('Verifying payment with backend...', '');
          const verifyPayload = await verifyWithBackend(responseJwt);
          setStatus('Payment successful', 'success');
          showResult({ verified: verifyPayload, callback: data });
          localStorage.removeItem('paymentSessionId');
        } catch (error) {
          setStatus(`Payment failed: ${normalizeError(error)}`, 'error');
          showResult({ callback: data || null, error: normalizeError(error) });
        }
      }

      async function initializeCardSession() {
        try {
          setStatus('Requesting CARD JWT...', '');
          const initPayload = await createInitSession('CARD');

          const st = SecureTrading({
            jwt: initPayload.jwt,
            errorReporting: true,
            submitOnSuccess: false,
            submitOnError: false,
            submitOnCancel: false,
            submitCallback: onSubmitCallback,
            components: {
              callbacks: {
                onPaymentFormRendered() {
                  setStatus('Card form ready', 'success');
                },
                onPaymentFormValidityChange(data) {
                  payBtn.disabled = !(data && data.isFormValid);
                }
              }
            }
          });

          st.Components();
          setStatus('Rendering card fields...', '');
          showResult({ init: initPayload });
        } catch (error) {
          setStatus(`Initialization failed: ${normalizeError(error)}`, 'error');
          showResult({ error: normalizeError(error) });
        }
      }

      initGoogleBtn.addEventListener('click', initializeGooglePaySession);
      initAppleBtn.addEventListener('click', initializeApplePaySession);
      initCardBtn.addEventListener('click', initializeCardSession);

      handleGatewayResponseFromQuery();
    })();
  </script>
</body>
</html>
